<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario 📕</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --magenta: #ff00ff;
            --orange: #ff9d00;
            --dark-bg: #05050a;
            --red: #ff3131;
            --glass: rgba(10, 10, 20, 0.95);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white; 
            overflow-x: hidden;
            overflow-y: auto;
            perspective: 1500px;
        }

        .background-layers {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; background: radial-gradient(circle at center, #101025 0%, #05050a 100%);
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(100px);
            opacity: 0.5; animation: floating 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; background: var(--cyan); top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: var(--purple); bottom: -10%; right: -10%; }
        @keyframes floating { from { transform: translate(0,0); } to { transform: translate(60px, 30px); } }

        .wrapper { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            width: 100%; 
            padding: 20px;
        }

        #main-system { 
            display: none; 
            min-height: 100vh; 
            width: 100%; 
            opacity: 0; 
            flex-direction: column; 
        }

        @media (min-width: 768px) {
            #main-system { flex-direction: row; } 
        }

        .sidebar {
            width: 100%;
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            display: flex; 
            flex-direction: column; 
            padding: 20px;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .sidebar { 
                width: 260px; 
                height: 100vh;
                border-right: 1px solid rgba(0, 242, 255, 0.1); 
                border-bottom: none; 
                position: sticky;
                top: 0;
            }
        }

        .main-content { 
            flex-grow: 1; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%;
        }

        .glass-card {
            background: var(--glass); 
            backdrop-filter: blur(30px);
            border-radius: 30px; 
            padding: 25px; 
            position: relative;
            z-index: 1; 
            overflow: hidden; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 450px; 
            margin: 10px auto;
        }

        .glass-card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(var(--cyan), var(--purple), var(--magenta), var(--cyan));
            animation: rotate-border 4s linear infinite; z-index: -2;
        }
        .glass-card::after {
            content: ""; position: absolute; inset: 4px; background: #080810;
            border-radius: 26px; z-index: -1;
        }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }

        input, textarea, select {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 12px; padding: 12px; color: white; outline: none; margin-bottom: 15px; width: 100%;
            font-size: 16px; 
        }

        .btn {
            background: linear-gradient(45deg, var(--purple), var(--magenta));
            border: none; padding: 14px 20px; border-radius: 50px;
            color: white; font-weight: bold; cursor: pointer; text-transform: uppercase;
            width: 100%; margin-bottom: 10px;
        }

        .nav-btn {
            background: none; border: none; color: #666; padding: 12px;
            text-align: left; font-size: 0.9rem; cursor: pointer; border-radius: 12px;
            margin-bottom: 5px; font-weight: bold;
        }
        .nav-btn.active { color: var(--cyan); background: rgba(0, 242, 255, 0.1); text-shadow: 0 0 10px var(--cyan); }

        .page-entry {
            background: rgba(255, 255, 255, 0.04); border-left: 4px solid var(--magenta);
            padding: 15px; border-radius: 15px; margin-bottom: 20px; position: relative; width: 100%;
        }

        .folder-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 10px; 
            margin: 20px 0; 
            width: 100%;
        }

        .folder-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--orange);
            padding: 15px; border-radius: 15px; text-align: center; cursor: pointer;
            position: relative; font-size: 0.8rem;
        }

        .delete-folder-btn {
            position: absolute; top: -5px; right: -5px;
            background: var(--red); color: white; border-radius: 50%;
            width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center;
        }

        #modal-visor {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); 
            z-index:3000; align-items:center; justify-content:center; backdrop-filter:blur(10px);
            padding: 20px;
        }

        .view { display: none; width: 100%; max-width: 800px; flex-direction: column; }
        .view.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        #loader {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            position: fixed; inset: 0; background: var(--dark-bg); z-index: 4000;
        }
        .scan-line { width: 150px; height: 2px; background: var(--cyan); animation: scan 1.5s infinite; }
        @keyframes scan { 0% { transform: translateY(-10px); } 100% { transform: translateY(10px); } }

        .notification {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.9); border: 1px solid var(--cyan);
            color: var(--cyan); padding: 12px 20px; border-radius: 10px; z-index: 5000;
            font-size: 0.8rem; text-align: center; width: 80%;
        }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="color: var(--cyan); letter-spacing: 3px; font-size: 1rem;">DESCIFRANDO IDENTIDAD...</h2>
        <div class="scan-line"></div>
    </div>

    <div class="background-layers">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="wrapper" id="auth-screen">
        <div class="glass-card" id="register-box">
            <h2 style="font-size: 1.2rem;">COMIENZA CREANDO TU PRIMER USUARIO </h2>
            <input type="text" id="reg-user" placeholder="USUARIO">
            <div style="display: flex; gap: 5px;">
                <div style="position: relative; flex-grow: 1;">
                    <input type="password" id="reg-pass" placeholder="CONTRASEÑA">
                    <button onclick="togglePass('reg-pass')" style="position:absolute; right:10px; top:12px; background:none; border:none; color:var(--cyan);">👁️</button>
                </div>
                <button class="btn" style="width: 70px; font-size: 0.6rem;" onclick="generarPassword()">AUTO</button>
            </div>
            <button class="btn" onclick="registrar()">Registrar</button>
            <p style="font-size: 0.8rem;">¿Ya tienes cuenta? <span style="color: var(--cyan); cursor: pointer;" onclick="toggleAuth()">Inicia sesión </span></p>
        </div>

        <div class="glass-card" id="login-box" style="display: none;">
            <h2 style="font-size: 1.2rem;">INICIAR SESIÓN</h2>
            <input type="text" id="log-user" placeholder="USUARIO">
            <div style="position: relative;">
                <input type="password" id="log-pass" placeholder="CONTRASEÑA">
                <button onclick="togglePass('log-pass')" style="position:absolute; right:10px; top:12px; background:none; border:none; color:var(--cyan);">👁️</button>
            </div>
            <button class="btn" onclick="iniciarSesion()">Desbloquear</button>
            <p style="font-size: 0.8rem;">¿Nuevo? <span style="color: var(--cyan); cursor: pointer;" onclick="toggleAuth()">Crear cuenta</span></p>
        </div>
    </div>

    <div id="main-system">
        <div class="sidebar">
            <h2 id="display-user" style="font-size: 0.8rem; color: var(--cyan); margin-bottom: 15px;">USUARIO: ---</h2>
            <button class="nav-btn active" id="nav-diario" onclick="showView('diario')">📔 MI DIARIO</button>
            <button class="nav-btn" id="nav-recuerdos" onclick="showView('recuerdos')">📸 RECUERDOS</button>

            <div style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button class="nav-btn" onclick="descargarData()" style="font-size: 0.6rem; padding: 5px;">💾 RESPALDO</button>
                <input type="file" id="import-file" hidden onchange="importarData(this)">
                <button class="nav-btn" onclick="document.getElementById('import-file').click()" style="font-size: 0.6rem; padding: 5px; color: var(--magenta);">📥 IMPORTAR</button>
                <button class="nav-btn" onclick="borrarTodo()" style="font-size: 0.6rem; padding: 5px; color: var(--red);">🗑️ BORRAR</button>
                <button class="nav-btn" onclick="location.reload()" style="font-size: 0.6rem; padding: 5px;">⏻ CERRAR</button>
            </div>
        </div>

        <div class="main-content">
            <div id="view-diario" class="view active">
                <h2 style="font-size: 1.1rem; text-align: center;">MEMORIAS ALMACENADAS</h2>
                <input type="text" id="search-diario" placeholder="🔍 Buscar..." onkeyup="filtrarDiario()">
                <div id="diario-container" style="width: 100%;"></div>

                <div class="glass-card" style="max-width: 100%;">
                    <h3 id="diario-form-title">NUEVA ENTRADA</h3>
                    <textarea id="diario-input" rows="3" placeholder="¿Qué pasó hoy?"></textarea>
                    <img id="preview-box-diario" style="width:80px; height:80px; object-fit:cover; display:none; border-radius:10px; margin-bottom:10px; border: 2px solid var(--cyan);">
                    <div style="display: flex; gap: 10px;">
                        <input type="file" id="diario-file" hidden onchange="previewFile('diario')">
                        <button class="btn btn-secondary" onclick="document.getElementById('diario-file').click()" style="flex:1;">📷 FOTO</button>
                        <button class="btn" id="btn-save-diario" onclick="guardarDiario()" style="flex:2;">GUARDAR</button>
                    </div>
                </div>
            </div>

            <div id="view-recuerdos" class="view">
                <h2 style="font-size: 1.1rem; text-align: center;">GALERÍA</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="new-folder-name" placeholder="Nueva carpeta..." style="margin:0;">
                    <button class="btn" style="width: auto; margin:0; padding: 0 15px;" onclick="nuevaCarpeta()">+</button>
                </div>
                <div id="folder-list" class="folder-grid"></div>
                <div id="gallery-display"></div>

                <div class="glass-card" style="max-width: 100%; margin-top: 20px;">
                    <h3>NUEVO RECUERDO</h3>
                    <input type="text" id="mem-title" placeholder="Título">
                    <select id="mem-folder-select"></select>
                    <img id="preview-box-mem" style="width:80px; height:80px; display:none; border-radius:10px; margin-bottom:10px;">
                    <input type="file" id="mem-file" hidden onchange="previewFile('mem')">
                    <button class="btn btn-secondary" onclick="document.getElementById('mem-file').click()">SUBIR IMAGEN</button>
                    <button class="btn" onclick="guardarRecuerdo()">AÑADIR</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-visor" onclick="if(event.target == this) cerrarModal()">
        <div class="glass-card" style="max-width:600px; width:100%; max-height:90vh; overflow-y:auto;">
            <h3 id="modal-fecha" style="color:var(--orange); font-size:0.8rem;"></h3>
            <div id="modal-contenido" style="white-space:pre-wrap; margin-bottom:15px;"></div>
            <img id="modal-foto" style="width:100%; border-radius:15px; display:none;">
            <button class="btn" onclick="cerrarModal()" style="margin-top:20px;">CERRAR</button>
        </div>
    </div>

    <script>
        let fotoTemporal = "";
        let folders = JSON.parse(localStorage.getItem('neon_folders')) || ["General"];
        let currentUser = null;
        let editIndex = -1; // Control de edición de diario

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sfx = {
            click: () => playSound(800, 'sine', 0.1),
            success: () => { playSound(600, 'square', 0.1); setTimeout(() => playSound(900, 'square', 0.2), 100); },
            error: () => playSound(150, 'sawtooth', 0.3),
            save: () => playSound(1200, 'sine', 0.4)
        };

        function togglePass(id) {
            sfx.click();
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }

        function notify(msg) {
            const t = document.createElement('div');
            t.className = 'notification';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function toggleAuth() {
            sfx.click();
            const r = document.getElementById('register-box');
            const l = document.getElementById('login-box');
            r.style.display = r.style.display === 'none' ? 'block' : 'none';
            l.style.display = l.style.display === 'none' ? 'block' : 'none';
        }

        function generarPassword() {
            sfx.success();
            const pass = Math.random().toString(36).slice(-6).toUpperCase();
            document.getElementById('reg-pass').value = pass;
            notify("Pase: " + pass);
        }

        function registrar() {
            const u = document.getElementById('reg-user').value;
            const p = document.getElementById('reg-pass').value;
            if(!u || !p) return notify("⚠️ Completa los campos");
            localStorage.setItem('neon_user_creds', JSON.stringify({user: u, pass: p}));
            sfx.success(); notify("✅ Registrado"); toggleAuth();
        }

        function iniciarSesion() {
            const u = document.getElementById('log-user').value;
            const p = document.getElementById('log-pass').value;
            const creds = JSON.parse(localStorage.getItem('neon_user_creds'));

            if(creds && u === creds.user && p === creds.pass) {
                sfx.success();
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('loader').style.display = 'flex';

                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-system').style.display = 'flex';
                    setTimeout(() => document.getElementById('main-system').style.opacity = "1", 50);
                    currentUser = u;
                    document.getElementById('display-user').innerText = `USUARIO: ${u.toUpperCase()}`;
                    renderDiario(); renderFolders();
                    notify("🔓 Sistema Abierto");
                }, 1500);
            } else {
                sfx.error(); notify("❌ Denegado");
            }
        }

        function showView(v) {
            sfx.click();
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.getElementById('nav-' + v).classList.add('active');
        }

        function previewFile(tipo) {
            const file = document.getElementById(tipo + '-file').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                fotoTemporal = reader.result;
                const p = document.getElementById('preview-box-' + tipo);
                p.src = fotoTemporal; p.style.display = "block";
            };
            if(file) reader.readAsDataURL(file);
        }

        // --- LÓGICA DE DIARIO ACTUALIZADA ---
        function guardarDiario() {
            const txt = document.getElementById('diario-input').value;
            if(!txt && !fotoTemporal) return notify("Escribe algo");

            let logs = JSON.parse(localStorage.getItem('misPaginas')) || [];
            const btn = document.getElementById('btn-save-diario');

            if(editIndex > -1) {
                // Actualizar existente
                logs[editIndex].text = txt;
                logs[editIndex].photo = fotoTemporal;
                logs[editIndex].date = "Editado: " + new Date().toLocaleString();
                editIndex = -1;
                btn.innerText = "GUARDAR";
                btn.style.filter = "";
                document.getElementById('diario-form-title').innerText = "NUEVA ENTRADA";
            } else {
                // Crear nuevo
                const entry = { text: txt, photo: fotoTemporal, date: new Date().toLocaleString() };
                logs.unshift(entry);
            }

            localStorage.setItem('misPaginas', JSON.stringify(logs));
            sfx.save();
            document.getElementById('diario-input').value = "";
            document.getElementById('preview-box-diario').style.display = "none";
            fotoTemporal = ""; 
            renderDiario(); 
            notify("✅ Guardado correctamente");
        }

        function prepararEdicion(index) {
            sfx.click();
            const logs = JSON.parse(localStorage.getItem('misPaginas')) || [];
            const entry = logs[index];

            document.getElementById('diario-input').value = entry.text;
            if(entry.photo) {
                fotoTemporal = entry.photo;
                const p = document.getElementById('preview-box-diario');
                p.src = fotoTemporal; 
                p.style.display = "block";
            }

            editIndex = index;
            document.getElementById('diario-form-title').innerText = "EDITANDO ENTRADA";
            const btn = document.getElementById('btn-save-diario');
            btn.innerText = "ACTUALIZAR";
            btn.style.filter = "hue-rotate(150deg)";
            document.getElementById('diario-input').focus();
        }

        function renderDiario() {
            const logs = JSON.parse(localStorage.getItem('misPaginas')) || [];
            const container = document.getElementById('diario-container');
            if(logs.length === 0) {
                container.innerHTML = `<p style="text-align:center; opacity:0.5;">Vacío.</p>`;
                return;
            }
            container.innerHTML = logs.map((l, index) => `
                <div class="page-entry">
                    <div style="position:absolute; right:10px; top:10px; display:flex; gap:10px;">
                        <button style="background:none; border:none; color:var(--cyan); cursor:pointer;" onclick="prepararEdicion(${index})">✏️</button>
                        <button style="background:none; border:none; color:var(--cyan); cursor:pointer;" onclick="verEntrada(${index})">👁️</button>
                        <button style="background:none; border:none; color:var(--red); cursor:pointer;" onclick="eliminarEntrada(${index})">🗑️</button>
                    </div>
                    <small style="color:var(--orange); font-size:0.7rem;">${l.date}</small>
                    <p style="margin:5px 0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px;">${l.text}</p>
                    ${l.photo ? `<small style="color:var(--cyan);">[FOTO]</small>` : ''}
                </div>`).join('');
        }

        function verEntrada(index) {
            sfx.success();
            const logs = JSON.parse(localStorage.getItem('misPaginas')) || [];
            const entry = logs[index];
            document.getElementById('modal-fecha').innerText = entry.date;
            document.getElementById('modal-contenido').innerText = entry.text;
            const img = document.getElementById('modal-foto');
            if(entry.photo) { img.src = entry.photo; img.style.display = "block"; } 
            else { img.style.display = "none"; }
            document.getElementById('modal-visor').style.display = "flex";
        }

        function cerrarModal() {
            sfx.click(); document.getElementById('modal-visor').style.display = "none";
        }

        function eliminarEntrada(index) {
            if(confirm("¿Borrar permanentemente?")) {
                let logs = JSON.parse(localStorage.getItem('misPaginas')) || [];
                logs.splice(index, 1);
                localStorage.setItem('misPaginas', JSON.stringify(logs));
                renderDiario();
                notify("Eliminado");
            }
        }

        // --- LÓGICA DE CARPETAS ACTUALIZADA ---
        function nuevaCarpeta() {
            const n = document.getElementById('new-folder-name').value;
            if(!n) return;
            folders.push(n);
            localStorage.setItem('neon_folders', JSON.stringify(folders));
            document.getElementById('new-folder-name').value = "";
            renderFolders(); notify("📁 Carpeta lista");
        }

        function renderFolders() {
            const list = document.getElementById('folder-list');
            list.innerHTML = folders.map((f, index) => `
                <div class="folder-item">
                    <div onclick="openFolder('${f}')">📁 ${f}</div>
                    <div style="margin-top:8px; display:flex; gap:10px; justify-content:center; border-top:1px solid rgba(255,255,255,0.1); padding-top:5px;">
                        <small style="color:var(--cyan); cursor:pointer" onclick="renombrarCarpeta(${index})">EDITAR</small>
                        ${f !== 'General' ? `<small style="color:var(--red); cursor:pointer" onclick="eliminarCarpeta(${index})">BORRAR</small>` : ''}
                    </div>
                </div>
            `).join('');
            document.getElementById('mem-folder-select').innerHTML = folders.map(f => `<option value="${f}">${f}</option>`).join('');
        }

        function renombrarCarpeta(index) {
            sfx.click();
            const nuevoNombre = prompt("Nuevo nombre para la carpeta:", folders[index]);
            if(nuevoNombre && nuevoNombre.trim() !== "") {
                const viejoNombre = folders[index];
                folders[index] = nuevoNombre;

                // Actualizar recuerdos vinculados
                let all = JSON.parse(localStorage.getItem('misRecuerdos')) || [];
                all = all.map(m => {
                    if(m.folder === viejoNombre) m.folder = nuevoNombre;
                    return m;
                });

                localStorage.setItem('misRecuerdos', JSON.stringify(all));
                localStorage.setItem('neon_folders', JSON.stringify(folders));
                renderFolders();
                notify("Carpeta renombrada");
            }
        }

        function eliminarCarpeta(index) {
            if (confirm("¿Borrar carpeta? Se perderán las fotos dentro.")) {
                const nombre = folders[index];
                folders.splice(index, 1);

                // Limpiar fotos de esa carpeta
                let all = JSON.parse(localStorage.getItem('misRecuerdos')) || [];
                all = all.filter(m => m.folder !== nombre);

                localStorage.setItem('misRecuerdos', JSON.stringify(all));
                localStorage.setItem('neon_folders', JSON.stringify(folders));
                renderFolders();
                document.getElementById('gallery-display').innerHTML = "";
            }
        }

        function guardarRecuerdo() {
            const title = document.getElementById('mem-title').value;
            const folder = document.getElementById('mem-folder-select').value;
            if(!title || !fotoTemporal) return notify("⚠️ Falta algo");
            const mem = { title, folder, photo: fotoTemporal };
            let all = JSON.parse(localStorage.getItem('misRecuerdos')) || [];
            all.push(mem);
            localStorage.setItem('misRecuerdos', JSON.stringify(all));
            sfx.save(); fotoTemporal = "";
            document.getElementById('preview-box-mem').style.display = "none";
            document.getElementById('mem-title').value = "";
            notify("📸 Guardado"); openFolder(folder);
        }

        function openFolder(f) {
            sfx.click();
            const all = JSON.parse(localStorage.getItem('misRecuerdos')) || [];
            const filtered = all.map((m, index) => ({...m, originalIndex: index})).filter(m => m.folder === f);

            const display = document.getElementById('gallery-display');
            let html = `<h4 style="color:var(--orange); border-bottom:1px solid; padding:5px; margin-top:20px;">${f}</h4>`;

            if (filtered.length === 0) {
                html += `<p style="font-size:0.7rem; opacity:0.5; text-align:center;">Carpeta vacía.</p>`;
            } else {
                html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">`;
                filtered.forEach(m => {
                    html += `
                        <div class="page-entry" style="padding:5px; cursor:pointer; position:relative;">
                            <div onclick="event.stopPropagation(); eliminarRecuerdo(${m.originalIndex}, '${f}')" 
                                 style="position:absolute; top:2px; right:2px; background:var(--red); color:white; 
                                        border-radius:50%; width:18px; height:18px; font-size:10px; 
                                        display:flex; align-items:center; justify-content:center; z-index:10;">✕</div>
                            
                            <div onclick="verRecuerdoEnGrande('${m.title}', '${m.photo}')">
                                <img src="${m.photo}" style="width:100%; height:80px; object-fit:cover; border-radius:5px;">
                                <small style="display:block; text-align:center; font-size:0.6rem; margin-top:5px; color:var(--cyan); overflow:hidden; text-overflow:ellipsis;">${m.title}</small>
                            </div>
                        </div>`;
                });
                html += `</div>`;
            }
            display.innerHTML = html;
        }

        function eliminarRecuerdo(index, folderName) {
            if(confirm("¿Eliminar foto?")) {
                let all = JSON.parse(localStorage.getItem('misRecuerdos')) || [];
                all.splice(index, 1);
                localStorage.setItem('misRecuerdos', JSON.stringify(all));
                sfx.error();
                openFolder(folderName);
            }
        }

        function verRecuerdoEnGrande(titulo, foto) {
            sfx.success();
            document.getElementById('modal-fecha').innerText = titulo;
            document.getElementById('modal-contenido').innerText = "";
            const img = document.getElementById('modal-foto');
            img.src = foto; img.style.display = "block";
            document.getElementById('modal-visor').style.display = "flex";
        }

        function descargarData() {
            const data = {
                diario: JSON.parse(localStorage.getItem('misPaginas')),
                recuerdos: JSON.parse(localStorage.getItem('misRecuerdos')),
                carpetas: folders,
                creds: JSON.parse(localStorage.getItem('neon_user_creds'))
            };
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type:'application/json'}));
            a.download = `respaldo_neon.json`; a.click();
        }

        function borrarTodo() {
            if(confirm("⚠️ ¿BORRAR TODO EL SISTEMA?")) { localStorage.clear(); location.reload(); }
        }

        function filtrarDiario() {
            const q = document.getElementById('search-diario').value.toLowerCase();
            const entries = document.querySelectorAll('.page-entry');
            entries.forEach(e => {
                const text = e.querySelector('p').innerText.toLowerCase();
                e.style.display = text.includes(q) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
